topics:
- key: "java-gc"
  title: "JVM Garbage Collection"
  questions:
  - "Explain the \"Weak Generational Hypothesis\" and how it justifies the physical\
    \ separation of the heap into Young and Old generations."
  - "Contrast the G1 Garbage Collector with the Parallel Collector in terms of throughput\
    \ versus latency; in what specific production scenarios would you prefer one over\
    \ the other?"
  - "How does the G1 collector utilize \"Remembered Sets\" (RSets) and \"Collection\
    \ Sets\" (CSets) to perform partial evacuations without scanning the entire heap?"
  - "Describe the concept of \"Safepoints\" and explain why an application might experience\
    \ long \"Stop-the-World\" pauses even if the GC log indicates short collection\
    \ times."
  - "Modern collectors like ZGC and Shenandoah achieve sub-millisecond pause times\
    \ regardless of heap size. Explain the role of \"Load Barriers\" and \"Colored\
    \ Pointers\" in enabling concurrent compaction."
  - "What are \"Humongous Objects\" in the context of region-based garbage collectors,\
    \ and how do they impact heap fragmentation and GC efficiency?"
  - "Explain the mechanics of object promotion (tenuring). Which JVM parameters would\
    \ you tune if you observed \"premature promotion\" leading to frequent Major GCs?"
  - "In a high-concurrency backend system, how would you diagnose a suspected memory\
    \ leak caused by ThreadLocals or static collections using heap dump analysis and\
    \ GC telemetry?"
- key: "jvm-memory"
  title: "JVM Memory Model"
  questions:
  - "Explain the fundamental difference between the Java Memory Model (JMM) and the\
    \ JVM Runtime Data Areas."
  - "How does the \"happens-before\" relationship define the visibility of memory\
    \ writes across different threads?"
  - "Describe the specific memory visibility and ordering guarantees provided by the\
    \ volatile keyword in Java."
  - "What are the semantic guarantees for final fields in the JMM, particularly regarding\
    \ object publication?"
  - "Compare and contrast the storage of primitive types versus object references\
    \ within the JVM Stack and the Heap."
  - "Explain the transition from PermGen to Metaspace. Where is Metaspace physically\
    \ located, and how is its size managed?"
  - "What is instruction reordering, and how do memory barriers (fences) prevent it\
    \ in a multi-threaded context?"
  - "Describe the role of Thread-Local Allocation Buffers (TLABs) in optimizing object\
    \ allocation performance on the Heap."
  - "Why is the double-checked locking pattern considered broken in versions prior\
    \ to Java 5, and how does volatile fix it?"
  - "In the context of the JVM Stack, what constitutes a Stack Frame and what information\
    \ is stored inside it during a method execution?"
  - "How does the JMM ensure atomicity for 64-bit values like long and double on different\
    \ architectures?"
  - "Explain the concept of \"False Sharing\" and how it relates to CPU cache lines\
    \ and the @Contended annotation."
  - "What are the differences between a StackOverflowError and an OutOfMemoryError\
    \ in the context of different JVM memory regions?"
  - "Describe how DirectByteBuffers interact with \"Off-Heap\" memory and how they\
    \ are eventually reclaimed by the JVM."
  - "Where does the String Constant Pool reside in modern JVMs, and how does its location\
    \ impact Garbage Collection behavior?"