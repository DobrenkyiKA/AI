pipeline:
  name: java-core-interview-v1

  topics:
    - key: java-gc
      title: JVM Garbage Collection
      description: >
        Memory management in the JVM, including generational garbage collection,
        stop-the-world pauses, GC algorithms, tuning parameters, and performance
        trade-offs relevant for backend engineers.
      constraints:
        exclusions:
          - android-runtime
          - kotlin-specific-jvm-behavior
        targetAudience: backend-engineers
        experienceLevel: mid-to-senior
        intendedUsage:
          - interview
          - learning
          - quiz
        questionCount: 6

    - key: jvm-memory
      title: JVM Memory Model
      description: >
        JVM memory areas such as heap, stack, metaspace, and the Java Memory Model,
        including visibility, ordering, and concurrency guarantees.
      constraints:
        exclusions:
          - android-runtime
          - kotlin-specific-jvm-behavior
        targetAudience: backend-engineers
        experienceLevel: mid-to-senior
        intendedUsage:
          - interview
          - learning
          - quiz
        questionCount: 6